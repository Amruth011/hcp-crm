services:
  # Backend FastAPI Web Service (serves both API and Frontend UI)
  - type: web
    name: hcp-crm-backend
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: npm install --prefix ../frontend && npm run build --prefix ../frontend && pip install -r requirements.txt
    startCommand: alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: PYTHON_VERSION
        value: 3.11.9

  # Frontend React Static Site
  - type: web
    name: hcp-crm-frontend
    runtime: static
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_URL
        value: https://hcp-crm-backend-pts2.onrender.com
